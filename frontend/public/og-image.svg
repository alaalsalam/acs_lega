<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1929"/>
      <stop offset="60%" stop-color="#132338"/>
      <stop offset="100%" stop-color="#070f1c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4983a"/>
      <stop offset="100%" stop-color="#d4ac52"/>
    </linearGradient>
    <linearGradient id="goldVert" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4983a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c4983a" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#goldVert)"/>

  <!-- Radial glow top-right -->
  <circle cx="1050" cy="120" r="280" fill="rgba(196,152,58,0.06)"/>
  <circle cx="180" cy="520" r="200" fill="rgba(23,64,110,0.12)"/>

  <!-- Left decorative accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="url(#goldGrad)"/>

  <!-- Top gold accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- ACS Logo mark (top left) -->
  <g transform="translate(72, 58)">
    <rect width="52" height="52" fill="none" stroke="#d4ac52" stroke-width="1.5" rx="6" opacity="0.7"/>
    <text x="26" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="#d4ac52" text-anchor="middle" letter-spacing="1">ACS</text>
  </g>

  <!-- Brand name (top right) -->
  <text x="1140" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="rgba(255,255,255,0.35)" text-anchor="end" letter-spacing="2">ACS LEGAL</text>

  <!-- Main headline -->
  <text x="72" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-1">قرارات قانونية</text>
  <text x="72" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-1">تحمي أعمالك</text>

  <!-- Gold highlight line -->
  <rect x="72" y="340" width="340" height="5" rx="3" fill="url(#goldGrad)"/>

  <!-- Subtitle -->
  <text x="72" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="rgba(255,255,255,0.55)">وتفتح مسار النمو.</text>

  <!-- Tagline -->
  <text x="72" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#c4983a" letter-spacing="1">محاماة واستشارات قانونية للأعمال · السعودية</text>

  <!-- Right side: Services badges -->
  <g transform="translate(760, 160)">
    <!-- Service item 1 -->
    <rect width="340" height="72" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="0" y="0" width="3" height="72" rx="2" fill="#c4983a" opacity="0.6"/>
    <text x="26" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#c4983a">الاستثمار الأجنبي</text>
    <text x="26" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.38)">ترخيص · إقامة مميزة · الشراكات</text>

    <!-- Service item 2 -->
    <rect y="84" width="340" height="72" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="0" y="84" width="3" height="72" rx="2" fill="#c4983a" opacity="0.6"/>
    <text x="26" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#c4983a">صياغة العقود</text>
    <text x="26" y="134" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.38)">مراجعة · التفاوض · التوقيع</text>

    <!-- Service item 3 -->
    <rect y="168" width="340" height="72" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="0" y="168" width="3" height="72" rx="2" fill="#c4983a" opacity="0.6"/>
    <text x="26" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#c4983a">التحكيم والنزاعات</text>
    <text x="26" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.38)">تمثيل · تحكيم تجاري · تسوية</text>

    <!-- Service item 4 -->
    <rect y="252" width="340" height="72" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="0" y="252" width="3" height="72" rx="2" fill="#c4983a" opacity="0.6"/>
    <text x="26" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#c4983a">تأسيس الشركات</text>
    <text x="26" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.38)">سجل تجاري · تراخيص · حوكمة</text>
  </g>

  <!-- Bottom stats bar -->
  <rect x="0" y="576" width="1200" height="54" fill="rgba(0,0,0,0.2)"/>
  <rect x="0" y="576" width="1200" height="2" fill="url(#goldGrad)" opacity="0.5"/>

  <!-- Stats items -->
  <text x="72" y="607" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="900" fill="#c4983a">15+</text>
  <text x="72" y="624" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.35)">سنة خبرة</text>

  <text x="220" y="607" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="900" fill="#c4983a">500+</text>
  <text x="220" y="624" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.35)">قضية منجزة</text>

  <text x="380" y="607" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="900" fill="#c4983a">10+</text>
  <text x="380" y="624" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.35)">مجالات قانونية</text>

  <text x="540" y="607" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="900" fill="#c4983a">24h</text>
  <text x="540" y="624" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.35)">متوسط الاستجابة</text>

  <!-- Divider -->
  <rect x="680" y="584" width="1" height="30" fill="rgba(255,255,255,0.1)"/>

  <!-- Contact CTA -->
  <text x="720" y="607" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.5)">info@acslegal.sa</text>
  <text x="720" y="624" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.5)">+966 53 750 0382</text>

  <!-- Location tag -->
  <text x="1130" y="607" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.3)" text-anchor="end" letter-spacing="1">المملكة العربية السعودية · الرياض</text>
</svg>